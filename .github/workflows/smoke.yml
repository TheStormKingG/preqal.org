name: Smoke Tests

on:
  # Run automatically after a successful deploy
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed

  # Also allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  smoke:
    # Only run if the deploy actually succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for deployment to be live
        # Give GitHub Pages CDN a moment to propagate after deploy
        run: sleep 20

      - name: Run smoke tests
        run: npx playwright test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
