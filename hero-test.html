<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hero — Stabroek3D + Saturn Rings</title>
<style>
  body { margin: 0; padding: 30px; background: #c8cdd6; font-family: Inter, sans-serif; }

  .hero {
    position: relative;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    max-width: 900px;
    margin: 0 auto;
    background: #e0e5ec;
    box-shadow: 10px 10px 28px rgba(163,177,198,0.65), -10px -10px 28px rgba(255,255,255,0.92);
  }

  /* Ambient amber glow */
  .glow {
    position: absolute; border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, rgba(245,158,11,0.13), transparent 68%);
  }

  /* ── Stage: image + rings ── */
  .stage {
    position: absolute;
    right: 20px;
    top: 50%;
    width: 340px;
    height: 340px;
    animation: float-s 6s ease-in-out infinite;
  }
  @keyframes float-s {
    0%,100% { transform: translateY(-50%); }
    50%      { transform: translateY(calc(-50% - 14px)); }
  }

  /* Building image */
  .building-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 8px 24px rgba(163,177,198,0.55))
            drop-shadow(0 2px 10px rgba(245,158,11,0.18));
  }

  /* ── Saturn rings (back half z:1, front half z:3) ── */
  .ring-half {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    pointer-events: none;
  }
  .ring-back  { z-index: 1; clip-path: inset(0 0 50% 0); }
  .ring-front { z-index: 3; clip-path: inset(50% 0 0 0); }

  /* Ring 1 — inner, brightest, fastest */
  .r1 {
    width: 310px; height: 78px;
    border: 3.5px solid rgba(245,158,11,0.70);
    box-shadow: 0 0 14px rgba(245,158,11,0.30);
    margin-left: -155px; margin-top: -39px;
    animation: orbit 8s linear infinite;
  }
  /* Ring 2 — mid */
  .r2 {
    width: 430px; height: 108px;
    border: 2px solid rgba(245,158,11,0.40);
    box-shadow: 0 0 8px rgba(245,158,11,0.12);
    margin-left: -215px; margin-top: -54px;
    animation: orbit 14s linear infinite;
  }
  /* Ring 3 — outer, subtlest */
  .r3 {
    width: 540px; height: 136px;
    border: 1.5px solid rgba(245,158,11,0.20);
    margin-left: -270px; margin-top: -68px;
    animation: orbit 22s linear infinite;
  }

  @keyframes orbit {
    0%   { transform: rotate(0deg)   scaleY(1);    }
    25%  { transform: rotate(90deg)  scaleY(0.12); }
    50%  { transform: rotate(180deg) scaleY(1);    }
    75%  { transform: rotate(270deg) scaleY(0.12); }
    100% { transform: rotate(360deg) scaleY(1);    }
  }

  /* ── Glass content card ── */
  .glass-card {
    position: absolute;
    left: 36px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
    max-width: 355px;
    z-index: 4;
  }
  .glass-inner {
    background: rgba(224,229,236,0.78);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow:
      6px 6px 18px rgba(163,177,198,0.55),
      -4px -4px 14px rgba(255,255,255,0.9),
      inset 0 1px 0 rgba(255,255,255,0.65);
    border: 1px solid rgba(255,255,255,0.55);
  }
  .tag {
    display: inline-block; font-size: 9px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: #d97706;
    background: rgba(245,158,11,0.1); padding: 4px 10px;
    border-radius: 20px; margin-bottom: 10px;
  }
  .headline { font-size: 1.6rem; font-weight: 700; line-height: 1.22; color: #1a2234; margin: 0 0 10px; }
  .headline span { color: #d97706; }
  .sub { font-size: 0.82rem; color: #64748b; margin: 0 0 20px; line-height: 1.65; }
  .cta { display: flex; gap: 10px; }
  .btn-p {
    padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff;
    font-size: 0.82rem; font-weight: 600;
    box-shadow: 4px 4px 12px rgba(217,119,6,0.35), -2px -2px 6px rgba(255,200,80,0.15);
  }
  .btn-g {
    padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
    background: #e0e5ec; font-size: 0.82rem; color: #475569; font-weight: 500;
    box-shadow: 3px 3px 8px rgba(163,177,198,0.5), -2px -2px 6px rgba(255,255,255,0.8);
  }
  .scroll-hint {
    position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 4;
  }
  .s-line { width: 1px; height: 22px; background: linear-gradient(to bottom, rgba(245,158,11,0.45), transparent); }
  .s-dot  { width: 5px; height: 5px; border-radius: 50%; background: #f59e0b; opacity: 0.6; animation: pd 1.6s ease-in-out infinite; }
  @keyframes pd { 0%,100%{transform:translateY(0);opacity:0.6} 50%{transform:translateY(4px);opacity:1} }
</style>
</head>
<body>
<div class="hero">
  <div class="glow" style="width:400px;height:400px;right:-20px;top:50%;margin-top:-200px"></div>
  <div class="glow" style="width:200px;height:200px;bottom:-60px;left:36%"></div>

  <div class="stage">
    <!-- Back ring halves (z:1, behind image) -->
    <div class="ring-half ring-back r1"></div>
    <div class="ring-half ring-back r2"></div>
    <div class="ring-half ring-back r3"></div>

    <!-- Building image (z:2) — transparent PNG -->
    <img class="building-img" src="stabroek3d.png" alt="Stabroek Market">

    <!-- Front ring halves (z:3, in front of image) -->
    <div class="ring-half ring-front r1"></div>
    <div class="ring-half ring-front r2"></div>
    <div class="ring-half ring-front r3"></div>
  </div>

  <div class="glass-card">
    <div class="glass-inner">
      <div class="tag">Quality · Safety · Compliance</div>
      <div class="headline">Systems that<br><span>actually work.</span></div>
      <div class="sub">Preqal helps agri-food and eco-hospitality businesses build compliance frameworks that hold up in the real world.</div>
      <div class="cta">
        <button class="btn-p">Book a Scan</button>
        <button class="btn-g">See Case Studies</button>
      </div>
    </div>
  </div>

  <div class="scroll-hint"><div class="s-line"></div><div class="s-dot"></div></div>
</div>
</body>
</html>
