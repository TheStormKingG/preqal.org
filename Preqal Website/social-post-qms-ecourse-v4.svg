<svg width="1080" height="1080" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Preqal QMS Foundations eCourse – Premium Light Social Post</title>
<desc>Light grey-blue background, navy typography, gold accent, button-style pill badges matching the Preqal site.</desc>
<style>text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>

<!-- Background: brand page background — light grey-blue, almost white -->
<rect width="680" height="680" fill="#F2F4F8"/>

<!-- White surface card inset -->
<rect x="32" y="32" width="616" height="616" rx="20" fill="#FFFFFF"/>

<!-- Top gold accent bar — 3px -->
<rect x="32" y="32" width="616" height="3" fill="#C9972A"/>

<!-- PREQAL wordmark -->
<text x="68" y="92" font-size="22" font-weight="800" fill="#1B3A6B" letter-spacing="6">PREQAL</text>

<!-- eCourse label -->
<text x="612" y="92" font-size="10" font-weight="600" fill="#C9972A" text-anchor="end" letter-spacing="4">eCOURSE</text>

<!-- Nav separator -->
<rect x="68" y="106" width="544" height="0.5" fill="#DDE1EB"/>

<!-- Main heading -->
<text x="68" y="218" font-size="66" font-weight="800" fill="#0F2547" letter-spacing="-2">Quality</text>
<text x="68" y="296" font-size="66" font-weight="800" fill="#0F2547" letter-spacing="-2">Management</text>
<text x="68" y="374" font-size="66" font-weight="800" fill="#C9972A" letter-spacing="-2">Systems</text>

<!-- Course tier label -->
<text x="70" y="414" font-size="11" font-weight="400" fill="#6B7280" letter-spacing="8">FOUNDATIONS</text>

<!-- Separator -->
<rect x="68" y="434" width="544" height="0.5" fill="#DDE1EB"/>

<!-- Primary badge: navy pill with white text -->
<rect x="68" y="452" width="162" height="44" rx="22" fill="#1B3A6B"/>
<text x="149" y="479" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">9 MODULES</text>

<!-- Secondary badge: cream fill, dark-gold text -->
<rect x="244" y="452" width="210" height="44" rx="22" fill="#FBF3E0"/>
<text x="349" y="479" font-size="12" font-weight="600" fill="#B8861F" text-anchor="middle" letter-spacing="1">ISO 9001 ALIGNED</text>

<!-- Feature list -->
<rect x="68" y="528" width="18" height="1.5" fill="#C9972A" rx="1"/>
<text x="98" y="534" font-size="14" font-weight="400" fill="#374151">Evidence-based systems &amp; documentation</text>

<rect x="68" y="558" width="18" height="1.5" fill="#C9972A" rx="1"/>
<text x="98" y="564" font-size="14" font-weight="400" fill="#374151">Built for Guyana &amp; the Caribbean</text>

<rect x="68" y="588" width="18" height="1.5" fill="#C9972A" rx="1"/>
<text x="98" y="594" font-size="14" font-weight="400" fill="#374151">From compliance gaps to audit-ready</text>

<!-- Bottom row -->
<rect x="68" y="620" width="544" height="0.5" fill="#DDE1EB"/>

<text x="68" y="651" font-size="11" font-weight="400" fill="#6B7280" letter-spacing="1">Enroll at</text>
<text x="124" y="651" font-size="12" font-weight="700" fill="#1B3A6B" letter-spacing="0.5">preqal.org</text>

<text x="612" y="643" font-size="11" font-weight="600" fill="#374151" text-anchor="end">Dr. Stefan Gravesande</text>
<text x="612" y="658" font-size="10" font-weight="400" fill="#6B7280" text-anchor="end">Founder &amp; CEO, Preqal</text>
</svg>
